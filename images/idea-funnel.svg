<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="funnel-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#2C5F8A"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="420" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="350" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">The Idea Pipeline</text>

  <!-- Stage 1: 100 raw ideas -->
  <rect x="100" y="60" width="500" height="60" rx="6" fill="url(#funnel-grad)" opacity="0.95"/>
  <text x="350" y="87" text-anchor="middle" font-size="15" font-weight="bold" fill="white">~100 Raw Ideas / Day</text>
  <text x="350" y="107" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">GPT Pro instances scan arXiv, Semantic Scholar, conference proceedings</text>

  <!-- Arrow 1 -->
  <polygon points="350,125 340,125 350,140 360,125" fill="#999"/>
  <text x="520" y="136" text-anchor="start" font-size="11" fill="#888" font-style="italic">5-10 parallel instances</text>

  <!-- Stage 2: Automated filter -->
  <rect x="150" y="145" width="400" height="60" rx="6" fill="url(#funnel-grad)" opacity="0.8"/>
  <text x="350" y="172" text-anchor="middle" font-size="15" font-weight="bold" fill="white">Automated Filter</text>
  <text x="350" y="192" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">Novelty, feasibility, impact, fit vs. prior work</text>

  <!-- Arrow 2 -->
  <polygon points="350,210 340,210 350,225 360,210" fill="#999"/>
  <text x="470" y="221" text-anchor="start" font-size="11" fill="#888" font-style="italic">~90% filtered out</text>

  <!-- Stage 3: 10 proposals -->
  <rect x="200" y="230" width="300" height="60" rx="6" fill="url(#funnel-grad)" opacity="0.65"/>
  <text x="350" y="257" text-anchor="middle" font-size="15" font-weight="bold" fill="white">~10 Ranked Proposals</text>
  <text x="350" y="277" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">You review these manually --- taste judgment</text>

  <!-- Arrow 3 -->
  <polygon points="350,295 340,295 350,310 360,295" fill="#999"/>
  <text x="425" y="306" text-anchor="start" font-size="11" fill="#888" font-style="italic">your taste</text>

  <!-- Stage 4: 1 project -->
  <rect x="265" y="315" width="170" height="55" rx="6" fill="#2C5F8A"/>
  <text x="350" y="340" text-anchor="middle" font-size="15" font-weight="bold" fill="white">1 New Project</text>
  <text x="350" y="358" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">per day, max</text>

  <!-- Backlog arrow -->
  <line x1="265" y1="342" x2="100" y2="342" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="100,342 110,337 110,347" fill="#999"/>
  <text x="100" y="330" text-anchor="start" font-size="11" fill="#888">Backlog queue</text>
  <text x="100" y="362" text-anchor="start" font-size="10" fill="#aaa">Remaining approved ideas</text>
  <text x="100" y="375" text-anchor="start" font-size="10" fill="#aaa">wait for capacity</text>
</svg>