<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="you-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#B8912E"/>
    </linearGradient>
    <linearGradient id="coord-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#3570B0"/>
    </linearGradient>
    <linearGradient id="sub-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7B8D"/>
      <stop offset="100%" stop-color="#505E6B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="700" height="400" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="350" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">The Agent Hierarchy</text>

  <!-- You (top) -->
  <rect x="275" y="50" width="150" height="50" rx="25" fill="url(#you-grad)"/>
  <text x="350" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="white">You</text>
  <text x="350" y="88" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">voice only</text>

  <!-- Role label -->
  <text x="600" y="75" text-anchor="end" font-size="11" fill="#999" font-style="italic">Research Advisor</text>

  <!-- Lines from You to Coordinators -->
  <line x1="290" y1="100" x2="130" y2="155" stroke="#bbb" stroke-width="1.5"/>
  <line x1="350" y1="100" x2="350" y2="155" stroke="#bbb" stroke-width="1.5"/>
  <line x1="410" y1="100" x2="570" y2="155" stroke="#bbb" stroke-width="1.5"/>

  <!-- Coordinator 1 -->
  <rect x="55" y="155" width="150" height="50" rx="8" fill="url(#coord-grad)"/>
  <text x="130" y="177" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Coordinator A</text>
  <text x="130" y="193" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">project-alpha</text>

  <!-- Coordinator 2 -->
  <rect x="275" y="155" width="150" height="50" rx="8" fill="url(#coord-grad)"/>
  <text x="350" y="177" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Coordinator B</text>
  <text x="350" y="193" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">project-beta</text>

  <!-- Coordinator 3 -->
  <rect x="495" y="155" width="150" height="50" rx="8" fill="url(#coord-grad)"/>
  <text x="570" y="177" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Coordinator C</text>
  <text x="570" y="193" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">project-gamma</text>

  <!-- Role label -->
  <text x="600" y="230" text-anchor="end" font-size="11" fill="#999" font-style="italic">"PhD Students"</text>

  <!-- Lines from Coordinator 1 to sub-agents -->
  <line x1="95" y1="205" x2="55" y2="260" stroke="#ccc" stroke-width="1"/>
  <line x1="130" y1="205" x2="130" y2="260" stroke="#ccc" stroke-width="1"/>
  <line x1="165" y1="205" x2="205" y2="260" stroke="#ccc" stroke-width="1"/>

  <!-- Lines from Coordinator 2 to sub-agents -->
  <line x1="315" y1="205" x2="275" y2="260" stroke="#ccc" stroke-width="1"/>
  <line x1="350" y1="205" x2="350" y2="260" stroke="#ccc" stroke-width="1"/>
  <line x1="385" y1="205" x2="425" y2="260" stroke="#ccc" stroke-width="1"/>

  <!-- Lines from Coordinator 3 to sub-agents -->
  <line x1="535" y1="205" x2="495" y2="260" stroke="#ccc" stroke-width="1"/>
  <line x1="570" y1="205" x2="570" y2="260" stroke="#ccc" stroke-width="1"/>
  <line x1="605" y1="205" x2="645" y2="260" stroke="#ccc" stroke-width="1"/>

  <!-- Sub-agents group 1 -->
  <rect x="25" y="260" width="60" height="36" rx="5" fill="url(#sub-grad)"/>
  <text x="55" y="282" text-anchor="middle" font-size="9" fill="white">code</text>
  <rect x="100" y="260" width="60" height="36" rx="5" fill="url(#sub-grad)"/>
  <text x="130" y="282" text-anchor="middle" font-size="9" fill="white">paper</text>
  <rect x="175" y="260" width="60" height="36" rx="5" fill="url(#sub-grad)"/>
  <text x="205" y="282" text-anchor="middle" font-size="9" fill="white">review</text>

  <!-- Sub-agents group 2 -->
  <rect x="245" y="260" width="60" height="36" rx="5" fill="url(#sub-grad)"/>
  <text x="275" y="282" text-anchor="middle" font-size="9" fill="white">code</text>
  <rect x="320" y="260" width="60" height="36" rx="5" fill="url(#sub-grad)"/>
  <text x="350" y="282" text-anchor="middle" font-size="9" fill="white">paper</text>
  <rect x="395" y="260" width="60" height="36" rx="5" fill="url(#sub-grad)"/>
  <text x="425" y="282" text-anchor="middle" font-size="9" fill="white">review</text>

  <!-- Sub-agents group 3 -->
  <rect x="465" y="260" width="60" height="36" rx="5" fill="url(#sub-grad)"/>
  <text x="495" y="282" text-anchor="middle" font-size="9" fill="white">code</text>
  <rect x="540" y="260" width="60" height="36" rx="5" fill="url(#sub-grad)"/>
  <text x="570" y="282" text-anchor="middle" font-size="9" fill="white">paper</text>
  <rect x="615" y="260" width="60" height="36" rx="5" fill="url(#sub-grad)"/>
  <text x="645" y="282" text-anchor="middle" font-size="9" fill="white">review</text>

  <!-- Role label -->
  <text x="600" y="320" text-anchor="end" font-size="11" fill="#999" font-style="italic">"Masters &amp; Undergrads"</text>

  <!-- Verification sub-sub-agents hint -->
  <text x="130" y="315" text-anchor="middle" font-size="9" fill="#aaa">+ test, verify, lit review, sweep ...</text>
  <text x="350" y="315" text-anchor="middle" font-size="9" fill="#aaa">+ test, verify, lit review, sweep ...</text>
  <text x="570" y="315" text-anchor="middle" font-size="9" fill="#aaa">+ test, verify, lit review, sweep ...</text>

  <!-- Bottom caption -->
  <text x="350" y="365" text-anchor="middle" font-size="12" fill="#666">Each coordinator dispatches everything to sub-agents.</text>
  <text x="350" y="382" text-anchor="middle" font-size="12" fill="#666">You only talk to coordinators.</text>
</svg>